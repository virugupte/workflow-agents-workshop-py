projects:
- name: virugupte-agents-workshop-queue
  environments:
  - name: production
    databases:
    - name: virugupte-queue-agents-db
      plan: basic-256mb
      region: oregon
      postgresMajorVersion: '18'
    services:
    - type: keyvalue
      name: virugupte-queue-agents-valkey
      plan: starter
      region: oregon
      maxmemoryPolicy: noeviction
      ipAllowList: []
    - type: web
      name: virugupte-queue-agents-web
      runtime: python
      region: oregon
      plan: starter
      buildCommand: pip install uv && uv sync --frozen --no-dev --package workshop-queue-agents
      startCommand: uv run python -m queue_agents.web
      healthCheckPath: /healthz
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: virugupte-queue-agents-db
          property: connectionString
      - key: VALKEY_URL
        fromService:
          name: virugupte-queue-agents-valkey
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: '3.12'
    - type: worker
      name: virugupte-queue-agents-worker
      runtime: python
      region: oregon
      plan: starter
      numInstances: 1
      buildCommand: pip install uv && uv sync --frozen --no-dev --package workshop-queue-agents
      startCommand: uv run python -m queue_agents.worker
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: virugupte-queue-agents-db
          property: connectionString
      - key: VALKEY_URL
        fromService:
          name: virugupte-queue-agents-valkey
          type: keyvalue
          property: connectionString
      - key: PYTHON_VERSION
        value: '3.12'
